function getDeadlineTag(item) {
  var today = '2026-07-07';
  if (item.deadlineType === 'ongoing') return { cls: 'tag-deadline-ongoing', text: '🔄 ' + item.deadline };
  if (item.deadlineType === 'policy') return { cls: 'tag-deadline-policy', text: '📌 ' + item.deadline };
  if (item.deadline < today) return { cls: 'tag-deadline-overdue', text: '⚠️ ' + item.deadline + ' (已逾期)' };
  return { cls: 'tag-deadline-date', text: '📅 ' + item.deadline };
}

// ===== BUILD HOME =====
function buildHome() {
  var grid = document.getElementById('cardGrid');
  grid.innerHTML = DATA.map(function(s, i) {
    var total = s.items.length;
    var overdue = s.items.filter(function(it){ return it.deadlineType === 'date' && it.deadline < '2026-07-07'; }).length;
    var ongoing = s.items.filter(function(it){ return it.deadlineType === 'ongoing'; }).length;
    var policy = s.items.filter(function(it){ return it.deadlineType === 'policy'; }).length;
    var desc = i===0 ? '按事项分类：获客、提佣、聚焦企业客户、分公司中台、AI工作、其他、营业部督导'
             : i===1 ? '按业务分类：总体工作安排'
             : '按部门分类：7个营业部/业务部门';
    return '<div class="entry-card ' + s.type + '" onclick="openSection(' + i + ')">' +
      '<div class="card-top"><div class="card-icon">' + s.icon + '</div>' +
      '<h2>' + s.title + '</h2><div class="card-desc">' + desc + '</div></div>' +
      '<div class="card-stats">' +
        '<div class="stat"><div class="stat-val">' + total + '</div><div class="stat-label">待办总数</div></div>' +
        '<div class="stat"><div class="stat-val">' + (overdue>0?'⚠ '+overdue:'0') + '</div><div class="stat-label">已逾期</div></div>' +
        '<div class="stat"><div class="stat-val">' + (ongoing>0?'🔄 '+ongoing:'0') + '</div><div class="stat-label">长期待办</div></div>' +
        '<div class="stat"><div class="stat-val">' + policy + '</div><div class="stat-label">政策类</div></div>' +
      '</div><div class="card-hint">点击查看明细 →</div></div>';
  }).join('');
}

// ===== NAVIGATION =====
function openSection(index) {
  currentSection = index;
  document.getElementById('homePage').style.display = 'none';
  document.getElementById('detailPage').style.display = 'block';
  document.getElementById('backBtn').style.display = 'flex';
  buildDetailFilters(index);
  renderDetail();
}
function goHome() {
  currentSection = null;
  document.getElementById('homePage').style.display = 'block';
  document.getElementById('detailPage').style.display = 'none';
  document.getElementById('backBtn').style.display = 'none';
}

// ===== DETAIL FILTERS =====
function buildDetailFilters(index) {
  var s = DATA[index];
  var projOpts = '<option value="">全部</option>';
  s.subs.forEach(function(sub){ projOpts += '<option value="' + sub + '">' + sub + '</option>'; });
  var persons = {};
  s.items.forEach(function(it){ if (it.person) persons[it.person] = true; });
  var persOpts = '<option value="">全部</option>';
  Object.keys(persons).sort().forEach(function(p){ persOpts += '<option value="' + p + '">' + p + '</option>'; });
  document.getElementById('filterBar').innerHTML =
    '<div class="filter-group"><label>📂 项目类型：</label><select id="fltProject" onchange="renderDetail()">' + projOpts + '</select></div>' +
    '<div class="filter-group"><label>👤 责任人：</label><select id="fltPerson" onchange="renderDetail()">' + persOpts + '</select></div>' +
    '<div class="filter-group"><label>⏰ 完成时间：</label><select id="fltDeadline" onchange="renderDetail()">' +
      '<option value="">全部</option><option value="overdue">已逾期</option><option value="this-week">本周内(7/7-7/13)</option>' +
      '<option value="ongoing">长期待办(持续)</option><option value="policy">政策类(待定)</option></select></div>' +
    '<button class="reset-btn" onclick="resetDetailFilters()">🔄 重置筛选</button>' +
    '<span class="result-badge">共 <strong id="detailCount">0</strong> 项待办</span>';
}
function resetDetailFilters() {
  document.getElementById('fltProject').value = '';
  document.getElementById('fltPerson').value = '';
  document.getElementById('fltDeadline').value = '';
  renderDetail();
}

// ===== RENDER DETAIL =====
function renderDetail() {
  var s = DATA[currentSection];
  var f = {
    project: document.getElementById('fltProject').value,
    person: document.getElementById('fltPerson').value,
    deadline: document.getElementById('fltDeadline').value
  };
  document.getElementById('detailPage').className = 'detail-page ' + s.type;

  var filtered = s.items.filter(function(item) {
    if (f.project && item.project !== f.project) return false;
    if (f.person && item.person !== f.person) return false;
    if (f.deadline) {
      var today = '2026-07-07';
      if (f.deadline === 'overdue' && !(item.deadlineType === 'date' && item.deadline < today)) return false;
      if (f.deadline === 'this-week' && !(item.deadlineType === 'date' && item.deadline >= today && item.deadline <= '2026-07-13')) return false;
      if (f.deadline === 'ongoing' && item.deadlineType !== 'ongoing') return false;
      if (f.deadline === 'policy' && item.deadlineType !== 'policy') return false;
    }
    return true;
  });

  var grouped = {};
  s.subs.forEach(function(sub){ grouped[sub] = []; });
  filtered.forEach(function(item){ if (grouped[item.project] !== undefined) grouped[item.project].push(item); });

  var html = '';
  s.subs.forEach(function(sub) {
    var items = grouped[sub] || [];
    if (items.length === 0) return;
    html += '<div class="sub-project"><div class="sub-project-title"><span class="dot"></span>' +
      sub + ' <span style="font-weight:400;font-size:11px;color:#94a3b8;">(' + items.length + '项)</span></div>' +
      '<div class="task-list">' + items.map(renderTaskItem).join('') + '</div></div>';
  });
  if (filtered.length === 0) html = '<div class="empty-state">🔍 当前筛选条件下无匹配待办事项</div>';

  document.getElementById('detailContent').innerHTML = html;
  document.getElementById('detailCount').textContent = filtered.length;
}

function renderTaskItem(item) {
  var dt = getDeadlineTag(item);
  return '<div class="task-item"><span class="task-num">' + item.num + '</span>' +
    '<div class="task-content"><div class="task-text">' + item.task + '</div>' +
    '<div class="task-meta"><span class="tag tag-person">👤 ' + pDisp(item.person) + '</span>' +
    '<span class="tag ' + dt.cls + '">' + dt.text + '</span></div></div></div>';
}

buildHome();
</script>
</body>
</html>
